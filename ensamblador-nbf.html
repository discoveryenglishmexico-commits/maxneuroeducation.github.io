<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FASE 2 - Ensamblador Estructural NBF</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #050b14; --dark-blue: #0A1628; --cyan: #00D9FF; 
  --magenta: #FF00FF; --emerald: #00FF9D; --text: #F8F9FA;
  --muted: #4a5568; --warning: #FF4500;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Rajdhani', sans-serif;
  background-color: var(--navy);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column; 
  align-items: center;
  padding: 30px 15px; 
  overflow-x: hidden;
}

#canvas-container {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
  background: radial-gradient(circle at center, var(--dark-blue) 0%, var(--navy) 100%);
}

.hud-panel {
  width: 100%; max-width: 1200px;
  background: rgba(255, 255, 255, 0.02);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(0, 217, 255, 0.2);
  border-radius: 15px;
  padding: 35px;
  box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
  text-align: center;
  position: relative;
}

h1 { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; color: var(--cyan); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px;}
h2 { font-size: 1.3rem; color: var(--emerald); font-weight: 300; margin-bottom: 30px; }

/* PANEL DE ESTRÉS COGNITIVO (CRONÓMETRO E INTENTOS) */
.stress-panel {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0,0,0,0.5);
  border: 1px solid var(--magenta);
  padding: 15px 30px;
  border-radius: 10px;
  margin-bottom: 30px;
}

.timer-box {
  font-family: 'Orbitron', sans-serif;
  font-size: 2rem;
  color: var(--cyan);
  font-weight: bold;
}

.attempts-box {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.2rem;
  color: var(--emerald);
}

.btn-start-timer {
  font-family: 'Orbitron', sans-serif; padding: 12px 30px; 
  background: var(--magenta); color: white; 
  border: none; border-radius: 50px; 
  font-size: 1.1rem; font-weight: bold;
  cursor: pointer; transition: 0.3s;
  box-shadow: 0 0 15px rgba(255,0,255,0.4);
}
.btn-start-timer:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(255,0,255,0.6); }

/* ZONAS DE ENSAMBLAJE */
.zone-title { font-family: 'Orbitron', sans-serif; font-size: 1rem; color: var(--muted); text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px;}

.assembly-zone {
  display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-start;
  min-height: 150px; margin-bottom: 40px;
  padding: 25px;
  background: rgba(0,0,0,0.4);
  border-radius: 10px;
  border-bottom: 2px solid var(--cyan);
}

.words-zone {
  display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
  min-height: 150px; margin-bottom: 30px;
  padding: 20px;
  border: 1px dashed rgba(255, 0, 255, 0.3);
  border-radius: 10px;
  transition: all 0.3s;
}

/* ESTADO BLOQUEADO */
.locked-zone {
  pointer-events: none;
  opacity: 0.3;
  filter: grayscale(100%);
}

/* BLOQUES DE TEXTO */
.word-block {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.2rem; font-weight: bold;
  padding: 10px 18px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: var(--text);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s ease;
  user-select: none;
}

.word-block:hover {
  background: rgba(0, 217, 255, 0.2);
  border-color: var(--cyan);
  box-shadow: 0 0 10px rgba(0,217,255,0.3);
  transform: translateY(-2px);
}

.empty-slot { width: 80px; height: 42px; border: 1px dashed var(--muted); border-radius: 6px; }

/* RESPUESTAS */
.correct-glow { border-color: var(--emerald) !important; background: rgba(0, 255, 157, 0.1) !important; color: var(--emerald) !important; box-shadow: 0 0 15px rgba(0, 255, 157, 0.4) !important;}
.wrong-glow { border-color: var(--magenta) !important; background: rgba(255, 0, 255, 0.1) !important; color: var(--magenta) !important; box-shadow: 0 0 15px rgba(255, 0, 255, 0.4) !important;}

.btn-action {
  font-family: 'Orbitron', sans-serif; padding: 15px 50px; 
  background: var(--cyan); color: var(--navy); 
  border: none; border-radius: 50px; 
  font-size: 1.3rem; font-weight: 900;
  cursor: pointer; transition: 0.3s;
  box-shadow: 0 0 20px rgba(0,217,255,0.3);
  margin-top: 20px;
}
.btn-action:hover { transform: scale(1.03); box-shadow: 0 0 30px rgba(0,217,255,0.5); }
.btn-action:disabled { background: var(--muted); color: #222; cursor: not-allowed; box-shadow: none; transform: none;}

#feedback-msg { margin-top: 25px; font-size: 1.4rem; font-weight: bold; min-height: 35px; letter-spacing: 1px; }

@media (max-width: 800px) {
  .stress-panel { flex-direction: column; gap: 15px; }
  .word-block { font-size: 1rem; padding: 8px 12px; }
  .empty-slot { width: 60px; height: 35px; }
  .hud-panel { padding: 15px; }
}
</style>
</head>
<body>

<div id="canvas-container"></div>

<div class="hud-panel">
  <h1>ENSAMBLADOR ESTRUCTURAL</h1>
  <h2>Fase 2: Reconstrucción Lógica del Bloque I</h2>

  <div class="stress-panel">
    <div class="attempts-box" id="attempts-display">INTENTOS: 3/3</div>
    <button class="btn-start-timer" id="btn-start" onclick="startMission()">▶ INICIAR CRONÓMETRO</button>
    <div class="timer-box" id="timer-display">02:30</div>
  </div>

  <div class="zone-title">NÚCLEO DE ENSAMBLAJE (TU ESTRUCTURA)</div>
  <div class="assembly-zone locked-zone" id="assembly-zone"></div>

  <div class="zone-title">BLOQUES DE MEMORIA FRAGMENTADOS</div>
  <div class="words-zone locked-zone" id="words-zone"></div>

  <button class="btn-action" id="btn-validate" onclick="validateAssembly()" disabled>VERIFICAR ESTRUCTURA</button>
  <div id="feedback-msg"></div>
</div>

<script>
// ==========================================
// CONFIGURACIÓN DE BLOQUE Y CRONÓMETRO
// ==========================================
const rawText = "In the city there are many sites that you can visit, there are many skyscrapers. There are good museums, galleries and exhibitions. There are from high culinary restaurants to hot-dog or pretzel stands. There are all type of schools. There are many malls and supermarkets, where you can buy whatever you want.";
const correctSentence = rawText.replace(/[.,;]/g, '').split(' ').filter(word => word.length > 0);
let availableWords = [];
let assembledWords = [];

// Variables de Juego
let attempts = 3;
let totalSeconds = 150; // 2 min 30 seg
let elapsedSeconds = 0;
let timerInterval = null;
let missionActive = false;

// Elementos DOM
const wordsZone = document.getElementById('words-zone');
const assemblyZone = document.getElementById('assembly-zone');
const feedbackMsg = document.getElementById('feedback-msg');
const timerDisplay = document.getElementById('timer-display');
const attemptsDisplay = document.getElementById('attempts-display');
const btnStart = document.getElementById('btn-start');
const btnValidate = document.getElementById('btn-validate');

// Audio de voz nativo
function speakStressPhrase(text, lang = 'es-MX') {
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = lang;
  utterance.rate = 1.0;
  window.speechSynthesis.speak(utterance);
}

// Inicializar bloques
function initAssembler() {
  availableWords = [...correctSentence].sort(() => Math.random() - 0.5);
  assembledWords = [];
  render();
}

function render() {
  wordsZone.innerHTML = '';
  availableWords.forEach((word, index) => {
    const btn = document.createElement('div');
    btn.className = 'word-block';
    btn.innerText = word;
    btn.onclick = () => { if(missionActive) moveToAssembly(index); };
    wordsZone.appendChild(btn);
  });

  assemblyZone.innerHTML = '';
  assembledWords.forEach((word, index) => {
    const btn = document.createElement('div');
    btn.className = 'word-block';
    btn.innerText = word;
    btn.onclick = () => { if(missionActive) moveToWords(index); };
    assemblyZone.appendChild(btn);
  });

  const emptySlotsNeeded = correctSentence.length - assembledWords.length;
  for (let i = 0; i < emptySlotsNeeded; i++) {
    const slot = document.createElement('div');
    slot.className = 'empty-slot';
    assemblyZone.appendChild(slot);
  }
}

function moveToAssembly(index) {
  feedbackMsg.innerText = "";
  const word = availableWords.splice(index, 1)[0];
  assembledWords.push(word);
  render();
}

function moveToWords(index) {
  feedbackMsg.innerText = "";
  const word = assembledWords.splice(index, 1)[0];
  availableWords.push(word);
  render();
}

// INICIAR MISIÓN Y CRONÓMETRO
function startMission() {
  missionActive = true;
  btnStart.style.display = 'none';
  wordsZone.classList.remove('locked-zone');
  assemblyZone.classList.remove('locked-zone');
  btnValidate.disabled = false;
  
  timerInterval = setInterval(updateTimer, 1000);
}

function updateTimer() {
  elapsedSeconds++;
  let remaining = totalSeconds - elapsedSeconds;
  
  if (remaining < 0) return;

  // Formatear visualmente MM:SS
  let m = Math.floor(remaining / 60).toString().padStart(2, '0');
  let s = (remaining % 60).toString().padStart(2, '0');
  timerDisplay.innerText = `${m}:${s}`;
  if(remaining <= 10) timerDisplay.style.color = "var(--warning)";

  // DISPARADORES DE ESTRÉS AUDITIVO
  if (elapsedSeconds === 10) speakStressPhrase("Han pasado 10 segundos");
  if (elapsedSeconds === 30) speakStressPhrase("Confío que hayas memorizado correctamente");
  if (elapsedSeconds === 60) speakStressPhrase("Verifica en la caja que no tengas un error");
  if (elapsedSeconds === 100) speakStressPhrase("Tenemos el tiempo encima");
  if (elapsedSeconds === 120) speakStressPhrase("Estamos por terminar");
  
  // Cuenta regresiva 10 a 1
  if (remaining <= 10 && remaining > 0) {
    speakStressPhrase(remaining.toString());
  }

  // Final del tiempo
  if (remaining === 0) {
    clearInterval(timerInterval);
    triggerGameOver("TIME IS OVER");
    speakStressPhrase("Time is over", 'en-US');
    setTimeout(() => speakStressPhrase("Debes regresar a la sección de entrenamiento a reforzar la memorización"), 1500);
  }
}

function validateAssembly() {
  if (!missionActive) return;

  if (assembledWords.length < correctSentence.length) {
    feedbackMsg.style.color = "var(--cyan)";
    feedbackMsg.innerText = `Faltan ${correctSentence.length - assembledWords.length} bloques.`;
    return;
  }

  let isCorrect = true;
  const assembledBlocks = assemblyZone.querySelectorAll('.word-block');
  
  for (let i = 0; i < correctSentence.length; i++) {
    if (assembledWords[i].toLowerCase() !== correctSentence[i].toLowerCase()) {
      isCorrect = false;
      assembledBlocks[i].classList.add('wrong-glow');
      setTimeout(() => assembledBlocks[i].classList.remove('wrong-glow'), 1500);
    } else {
      assembledBlocks[i].classList.add('correct-glow');
    }
  }

  if (isCorrect) {
    clearInterval(timerInterval);
    missionActive = false;
    btnValidate.disabled = true;
    feedbackMsg.style.color = "var(--emerald)";
    feedbackMsg.innerText = "¡RECONFIGURACIÓN LÓGICA EXITOSA!";
    speakStressPhrase("Misión completada con éxito");
  } else {
    attempts--;
    attemptsDisplay.innerText = `INTENTOS: ${attempts}/3`;
    
    if (attempts === 0) {
      clearInterval(timerInterval);
      triggerGameOver("INTENTOS AGOTADOS");
      speakStressPhrase("Intentos agotados. Debes regresar a la sección de entrenamiento a reforzar la memorización.");
    } else {
      feedbackMsg.style.color = "var(--magenta)";
      feedbackMsg.innerText = "ERROR ESTRUCTURAL. TE QUEDAN " + attempts + " INTENTOS.";
    }
  }
}

function triggerGameOver(reason) {
  missionActive = false;
  wordsZone.classList.add('locked-zone');
  assemblyZone.classList.add('locked-zone');
  btnValidate.disabled = true;
  feedbackMsg.style.color = "var(--warning)";
  feedbackMsg.innerText = `${reason}. MISIÓN FALLIDA.`;
}

// PARTÍCULAS NEURALES
const canvasContainer = document.getElementById('canvas-container');
const canvas = document.createElement('canvas'); canvasContainer.appendChild(canvas);
const ctx = canvas.getContext('2d'); let particles = [];
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.onresize = resize; resize();
class Particle {
  constructor() { this.reset(); }
  reset() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.size = Math.random()*1.5; this.speedX = (Math.random()-0.5)*0.3; this.speedY = (Math.random()-0.5)*0.3; }
  update() { this.x+=this.speedX; this.y+=this.speedY; if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height) this.reset(); }
  draw() { ctx.fillStyle='rgba(0,255,255,0.6)'; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); }
}
for(let i=0; i<80; i++) particles.push(new Particle());
function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
animate();

initAssembler();
</script>
</body>
</html>
