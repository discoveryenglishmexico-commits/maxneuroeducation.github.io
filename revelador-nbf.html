<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revelador de Conciencia - Discovery MAX</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0A1628;
  --dark-metallic: #1A1F2E;
  --panel: rgba(255, 255, 255, 0.05);
  --border: rgba(0, 217, 255, 0.3);
  --neon-fuchsia: #FF00FF;
  --neon-emerald: #00FF9D;
  --neon-blue: #00D9FF;
  --text: #F8F9FA;
  --muted: #8892B0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, var(--navy) 0%, var(--dark-metallic) 50%, var(--navy) 100%); color: var(--text); min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center; }

.neural-overlay { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at 20% 50%, rgba(0, 217, 255, 0.1) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(255, 0, 255, 0.1) 0%, transparent 50%); }

.container { max-width: 900px; width: 100%; position: relative; z-index: 10; margin-top: 20px; }

header { text-align: center; margin-bottom: 30px; }
header h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(1.8rem, 4vw, 2.5rem); background: linear-gradient(135deg, var(--neon-blue), var(--neon-fuchsia)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
header p { font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; color: var(--neon-emerald); letter-spacing: 1px; margin-top: 10px; }

.workspace { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
@media (max-width: 768px) { .workspace { grid-template-columns: 1fr; } }

.panel { background: rgba(10, 22, 40, 0.8); border: 1px solid var(--border); border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 0 20px rgba(0, 217, 255, 0.05); }
.panel h2 { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: var(--muted); margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

.word-btn { background: rgba(0, 0, 0, 0.5); border: 2px solid var(--muted); color: var(--text); font-family: 'Orbitron', sans-serif; font-size: 1.2rem; padding: 15px 20px; border-radius: 10px; cursor: pointer; transition: all 0.3s; margin: 5px; width: calc(50% - 10px); display: inline-block; }
.word-btn:hover { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 217, 255, 0.3); }

/* Estados seleccionados */
.word-btn.selected-ppd { border-color: var(--neon-emerald); background: rgba(0, 255, 157, 0.2); box-shadow: 0 0 20px rgba(0, 255, 157, 0.5); }
.word-btn.selected-noun { border-color: var(--neon-fuchsia); background: rgba(255, 0, 255, 0.2); box-shadow: 0 0 20px rgba(255, 0, 255, 0.5); }

/* Pantalla de Resultados */
.result-screen { background: var(--panel); backdrop-filter: blur(10px); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px; text-align: center; min-height: 250px; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: all 0.4s ease; }

.result-title { font-family: 'Orbitron', sans-serif; font-size: 3rem; margin-bottom: 15px; letter-spacing: 2px; }
.result-desc { font-family: 'Inter', sans-serif; font-size: 1.2rem; line-height: 1.6; max-width: 600px; }

/* Efecto de Noun (Inactivo) */
.state-noun { border-color: var(--muted); }
.state-noun .result-title { color: var(--muted); text-shadow: none; }

/* Efecto Activado (Acción) */
.state-active { border-color: var(--neon-blue); box-shadow: 0 0 40px rgba(0, 217, 255, 0.2); animation: pulse-active 2s infinite; }
.state-active .result-title { color: var(--neon-emerald); text-shadow: 0 0 20px var(--neon-emerald); }
@keyframes pulse-active { 0%, 100% { box-shadow: 0 0 20px rgba(0, 217, 255, 0.2); } 50% { box-shadow: 0 0 50px rgba(0, 217, 255, 0.6); } }

.reset-btn { margin-top: 20px; background: transparent; border: 1px solid var(--muted); color: var(--muted); padding: 10px 20px; border-radius: 5px; cursor: pointer; transition: all 0.3s; }
.reset-btn:hover { background: rgba(255,255,255,0.1); color: white; border-color: white; }

</style>
</head>
<body>

<div class="neural-overlay"></div>

<div class="container">
  <header>
    <h1>Despertar Cognitivo</h1>
    <p>Selecciona una palabra para ver su estado natural. Actívala combinándola con un PPD.</p>
  </header>

  <div class="workspace">
    <div class="panel">
      <h2>1. Pronombre Personal Directo (Activador)</h2>
      <button class="word-btn ppd" onclick="selectPPD('I')">I</button>
      <button class="word-btn ppd" onclick="selectPPD('You')">You</button>
      <button class="word-btn ppd" onclick="selectPPD('We')">We</button>
      <button class="word-btn ppd" onclick="selectPPD('They')">They</button>
    </div>

    <div class="panel">
      <h2>2. Palabras Base (Sustantivos)</h2>
      <button class="word-btn noun" onclick="selectNoun('can')">Can</button>
      <button class="word-btn noun" onclick="selectNoun('stand')">Stand</button>
      <button class="word-btn noun" onclick="selectNoun('book')">Book</button>
      <button class="word-btn noun" onclick="selectNoun('water')">Water</button>
    </div>
  </div>

  <div id="result-display" class="result-screen state-noun">
    <div class="result-title" id="r-title">...</div>
    <div class="result-desc" id="r-desc">Toca una Palabra Base para ver su significado real. Luego, selecciona un Pronombre para "encender" la acción.</div>
    <button class="reset-btn" onclick="resetBoard()">Limpiar Tablero</button>
  </div>
</div>

<script>
// Base de datos cognitiva
const dictionary = {
  can: {
    rawMeaning: "🥫 Una lata (Recipiente metálico).",
    rawExplanation: "Tu cerebro sufre pausa porque busca un 'verbo'. 'Can' por sí sola es solo un sustantivo u objeto inerte.",
    activeMeaning: "Tener la capacidad / Poder",
    activeExplanation: "¡Activación lograda! Al conectar un PPD, la 'lata' se transforma en una Palabra Modal de capacidad."
  },
  stand: {
    rawMeaning: "🏪 Un puesto / Soporte (Ej. Hot dog stand).",
    rawExplanation: "Por sí sola, 'stand' es un sustantivo. Por eso tardas en traducir 'ponerse de pie', tu cerebro no asocia la acción.",
    activeMeaning: "Ponerse de pie / Soportar",
    activeExplanation: "¡Activación lograda! El PPD ha encendido el sustantivo, dándole la función de una acción corporal."
  },
  book: {
    rawMeaning: "📚 Un libro (Objeto físico).",
    rawExplanation: "Es un sustantivo inerte. No tiene movimiento ni acción en su estado natural.",
    activeMeaning: "Reservar (Ej. un vuelo o mesa)",
    activeExplanation: "¡Activación lograda! Al intervenir un sujeto, la palabra funciona como la acción de hacer una reserva."
  },
  water: {
    rawMeaning: "💧 Agua (Líquido vital).",
    rawExplanation: "El elemento natural. Un sustantivo puro.",
    activeMeaning: "Regar (Ej. las plantas)",
    activeExplanation: "¡Activación lograda! Al aplicar el PPD, el sustantivo se convierte en la acción de proveer agua."
  }
};

let currentPPD = null;
let currentNoun = null;

function selectPPD(word) {
  currentPPD = word;
  
  // Limpiar estilos visuales de botones PPD
  document.querySelectorAll('.ppd').forEach(btn => btn.classList.remove('selected-ppd'));
  // Encontrar el botón clickeado y resaltarlo
  event.target.classList.add('selected-ppd');
  
  updateDisplay();
}

function selectNoun(word) {
  currentNoun = word;
  
  // Limpiar estilos visuales de botones Noun
  document.querySelectorAll('.noun').forEach(btn => btn.classList.remove('selected-noun'));
  // Encontrar el botón clickeado y resaltarlo
  event.target.classList.add('selected-noun');
  
  updateDisplay();
}

function updateDisplay() {
  const display = document.getElementById('result-display');
  const title = document.getElementById('r-title');
  const desc = document.getElementById('r-desc');
  
  if (currentNoun && !currentPPD) {
    // ESTADO 1: Solo sustantivo (Inactivo)
    display.className = 'result-screen state-noun';
    title.innerText = currentNoun.toUpperCase();
    desc.innerHTML = `<strong style="color:var(--neon-fuchsia); font-size: 1.4rem;">${dictionary[currentNoun].rawMeaning}</strong><br><br>${dictionary[currentNoun].rawExplanation}`;
  } 
  else if (currentNoun && currentPPD) {
    // ESTADO 2: Activación Cognitiva NBF
    display.className = 'result-screen state-active';
    title.innerText = `${currentPPD} ${currentNoun}`.toUpperCase();
    desc.innerHTML = `<strong style="color:var(--neon-emerald); font-size: 1.4rem;">${dictionary[currentNoun].activeMeaning}</strong><br><br>${dictionary[currentNoun].activeExplanation}`;
    
    // Pequeño sonido de éxito (opcional) usando Web Audio API
    playActivationSound();
  }
}

function resetBoard() {
  currentPPD = null;
  currentNoun = null;
  document.querySelectorAll('.word-btn').forEach(btn => {
    btn.classList.remove('selected-ppd');
    btn.classList.remove('selected-noun');
  });
  
  const display = document.getElementById('result-display');
  display.className = 'result-screen state-noun';
  document.getElementById('r-title').innerText = "...";
  document.getElementById('r-desc').innerText = 'Toca una Palabra Base para ver su significado real. Luego, selecciona un Pronombre para "encender" la acción.';
}

function playActivationSound() {
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  
  osc.type = 'sine';
  osc.frequency.setValueAtTime(600, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.3);
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
  
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.5);
}
</script>
</body>
</html>
