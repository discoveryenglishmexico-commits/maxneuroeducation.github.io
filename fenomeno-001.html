<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fenómeno 001 — Ensamble Cognitivo</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: #0a0e27;
  display: flex;
  justify-content: center;
  align-items: center;
}

#assembly-svg {
  width: 100%;
  height: 100%;
  max-width: 100vw;
  max-height: 100vh;
}

.word-group {
  opacity: 0;
  transition: 
    transform 1400ms cubic-bezier(0.22, 1, 0.36, 1),
    opacity 500ms ease;
}

.word-group.visible {
  opacity: 1;
}

.word-text {
  font-family: 'Playfair Display', serif;
  font-size: 80px;
  font-weight: 400;
  fill: #e8eaf6;
}

.echo-text {
  font-family: 'Inter', sans-serif;
  font-size: 32px;
  font-weight: 300;
  fill: #b8bcd4;
  opacity: 0;
  filter: blur(1.5px);
  transform-origin: center;
  transition: 
    opacity 800ms ease,
    transform 1200ms ease;
}

.echo-text.visible {
  opacity: 0.75;
  transform: scale(1.08);
}

.echo-text.fade-out {
  opacity: 0;
  transform: scale(0.94);
}

.floating-letter {
  font-family: 'Playfair Display', serif;
  font-size: 80px;
  font-weight: 400;
  fill: #e8eaf6;
  opacity: 0;
  transition: 
    transform 1400ms cubic-bezier(0.22, 1, 0.36, 1),
    opacity 500ms ease;
}

.floating-letter.visible {
  opacity: 1;
}

.floating-letter.integrated {
  opacity: 0;
}
</style>
</head>
<body>

<svg id="assembly-svg" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid meet">
  
  <!-- need -->
  <g id="word-need" class="word-group">
    <text class="word-text" x="0" y="0">need</text>
    <text class="echo-text" id="echo-need" x="0" y="-20">necesidad</text>
  </g>
  
  <!-- water -->
  <g id="word-water" class="word-group">
    <text class="word-text" x="0" y="0">water</text>
    <text class="echo-text" id="echo-water" x="0" y="-20">agua</text>
  </g>
  
  <!-- the -->
  <g id="word-the" class="word-group">
    <text class="word-text" x="0" y="0">the</text>
  </g>
  
  <!-- y (flotante) -->
  <text id="letter-y" class="floating-letter" x="0" y="0">y</text>
  
  <!-- to -->
  <g id="word-to" class="word-group">
    <text class="word-text" x="0" y="0">to</text>
  </g>
  
</svg>

<script>
// Configuración
const SVG_WIDTH = 1200;
const SVG_HEIGHT = 400;
const CENTER_X = SVG_WIDTH / 2;
const CENTER_Y = SVG_HEIGHT / 2 + 25;
const WORD_SPACING = 50;
const MARGIN_PERCENT = 0.08;

// Anchos aproximados de palabras (con font-size 80px)
const wordWidths = {
  'need': 120,
  'water': 160,
  'the': 80,
  'they': 130,
  'to': 70,
  'y': 30
};

// Calcular posiciones para cada estado (centrado horizontal)
function calculateStatePositions(words) {
  const totalWidth = words.reduce((sum, word, index) => {
    return sum + wordWidths[word] + (index < words.length - 1 ? WORD_SPACING : 0);
  }, 0);
  
  const startX = CENTER_X - totalWidth / 2;
  const positions = {};
  let currentX = startX;
  
  words.forEach(word => {
    positions[word] = currentX;
    currentX += wordWidths[word] + WORD_SPACING;
  });
  
  return positions;
}

// Definir los 5 estados
const states = {
  1: calculateStatePositions(['need']),
  2: calculateStatePositions(['need', 'water']),
  3: calculateStatePositions(['the', 'need', 'water']),
  4: calculateStatePositions(['they', 'need', 'water']),
  5: calculateStatePositions(['they', 'need', 'to', 'water'])
};

// Función para posicionar una palabra
function positionWord(wordId, x, y) {
  const group = document.getElementById(wordId);
  if (group) {
    group.style.transform = `translate(${x}px, ${y}px)`;
  }
}

// Función para mostrar una palabra
function showWord(wordId) {
  const group = document.getElementById(wordId);
  if (group) {
    group.classList.add('visible');
  }
}

// Función para mostrar eco
function showEcho(echoId) {
  const echo = document.getElementById(echoId);
  if (echo) {
    echo.classList.add('visible');
  }
}

// Función para ocultar eco
function hideEcho(echoId) {
  const echo = document.getElementById(echoId);
  if (echo) {
    echo.classList.add('fade-out');
  }
}

// Secuencia de animación
function runSequence() {
  // ESTADO 1: need
  setTimeout(() => {
    positionWord('word-need', states[1]['need'], CENTER_Y);
    showWord('word-need');
  }, 500);
  
  // Eco "necesidad" - emerge desde atrás
  setTimeout(() => {
    showEcho('echo-need');
  }, 2000);
  
  setTimeout(() => {
    hideEcho('echo-need');
  }, 3200);
  
  // ESTADO 2: need water
  setTimeout(() => {
    positionWord('word-need', states[2]['need'], CENTER_Y);
    positionWord('word-water', states[2]['water'], CENTER_Y);
    showWord('word-water');
  }, 4500);
  
  // Eco "agua" - emerge desde atrás
  setTimeout(() => {
    showEcho('echo-water');
  }, 6000);
  
  setTimeout(() => {
    hideEcho('echo-water');
  }, 7200);
  
  // ESTADO 3: the need water
  setTimeout(() => {
    positionWord('word-the', states[3]['the'], CENTER_Y);
    positionWord('word-need', states[3]['need'], CENTER_Y);
    positionWord('word-water', states[3]['water'], CENTER_Y);
    showWord('word-the');
  }, 8500);
  
  // ESTADO 4: they need water (the + y = they)
  setTimeout(() => {
    // Posicionar "y" al final de "the"
    const theX = states[3]['the'];
    const yX = theX + wordWidths['the'];
    const letterY = document.getElementById('letter-y');
    letterY.style.transform = `translate(${yX}px, ${CENTER_Y}px)`;
    letterY.classList.add('visible');
  }, 10500);
  
  // Integrar "y" y transformar "the" en "they"
  setTimeout(() => {
    const letterY = document.getElementById('letter-y');
    letterY.classList.add('integrated');
    
    // Cambiar "the" a "they" y reposicionar
    const theGroup = document.getElementById('word-the');
    const theText = theGroup.querySelector('.word-text');
    theText.textContent = 'they';
    
    positionWord('word-the', states[4]['they'], CENTER_Y);
    positionWord('word-need', states[4]['need'], CENTER_Y);
    positionWord('word-water', states[4]['water'], CENTER_Y);
  }, 12000);
  
  // ESTADO 5: they need to water
  // Primero mover water para abrir espacio, luego aparecer to
  setTimeout(() => {
    positionWord('word-water', states[5]['water'], CENTER_Y);
  }, 13500);
  
  setTimeout(() => {
    positionWord('word-to', states[5]['to'], CENTER_Y);
    positionWord('word-they', states[5]['they'], CENTER_Y);
    positionWord('word-need', states[5]['need'], CENTER_Y);
    showWord('word-to');
  }, 14000);
}

// Iniciar secuencia cuando cargue la página
window.addEventListener('DOMContentLoaded', () => {
  runSequence();
});
</script>

</body>
</html>
