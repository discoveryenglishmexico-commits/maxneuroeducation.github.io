<script>
/* ========================================
   PROYECTO GÉNESIS — ESCENA 01
   Lógica de la experiencia
   Versión: ALFA 1.1 (Ritmo ajustado)
   ======================================== */

// Estado global
const state = {
  currentMoment: 0,
  isPlaying: false,
  audioEnabled: false,
  sequenceStarted: false
};

// TIMING AJUSTADO (De ~37s a ~23s)
// La suavidad del fade se mantiene, pero los mensajes cambian más rápido.
const TIMING = {
  moment1Start: 500,      // 0.5s
  moment1Duration: 3500,  // 3.5s
  moment2Start: 4000,     // 4.0s
  moment2Duration: 4000,  // 4.0s
  moment3Start: 8000,     // 8.0s
  moment3Duration: 5000,  // 5.0s
  moment4Start: 13000,    // 13.0s
  moment4Duration: 5000,  // 5.0s
  moment5Start: 18000,    // 18.0s
  moment5Duration: 5000,  // 5.0s
  ctaStart: 23000         // 23.0s (La puerta aparece)
};

// ========================================
// CANVAS — Partículas y líneas sutiles
// ========================================
const canvas = document.getElementById('backgroundCanvas');
const ctx = canvas.getContext('2d');

let particles = [];
let lines = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.vx = (Math.random() - 0.5) * 0.15; // Un poco más lentas
    this.vy = (Math.random() - 0.5) * 0.15;
    this.radius = Math.random() * 1.2;
    this.opacity = Math.random() * 0.4 + 0.1;
  }
  
  update() {
    this.x += this.vx;
    this.y += this.vy;
    
    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
  }
  
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(102, 126, 234, ${this.opacity})`;
    ctx.fill();
  }
}

class Line {
  constructor() {
    this.reset();
  }
  
  reset() {
    this.x1 = Math.random() * canvas.width;
    this.y1 = Math.random() * canvas.height;
    this.x2 = this.x1 + (Math.random() - 0.5) * 150;
    this.y2 = this.y1 + (Math.random() - 0.5) * 150;
    this.opacity = 0;
    this.fadeIn = true;
    this.life = Math.random() * 200 + 100;
    this.age = 0;
  }
  
  update() {
    this.age++;
    
    if (this.fadeIn) {
      this.opacity += 0.004;
      if (this.opacity >= 0.12) this.fadeIn = false;
    } else {
      this.opacity -= 0.004;
    }
    
    if (this.age > this.life || this.opacity <= 0) {
      this.reset();
    }
  }
  
  draw() {
    ctx.beginPath();
    ctx.moveTo(this.x1, this.y1);
    ctx.lineTo(this.x2, this.y2);
    ctx.strokeStyle = `rgba(102, 126, 234, ${this.opacity})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
}

function initCanvas() {
  resizeCanvas();
  for (let i = 0; i < 40; i++) particles.push(new Particle());
  for (let i = 0; i < 4; i++) lines.push(new Line());
}

function animateCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  lines.forEach(l => { l.update(); l.draw(); });
  requestAnimationFrame(animateCanvas);
}

// ========================================
// SECUENCIA DE MENSAJES
// ========================================
function showMessage(id) {
  document.querySelectorAll('.message').forEach(msg => msg.classList.remove('visible'));
  const message = document.getElementById(id);
  if (message) message.classList.add('visible');
}

function showCTA() {
  document.getElementById('ctaContainer').classList.add('visible');
}

function startSequence() {
  if (state.sequenceStarted) return;
  state.sequenceStarted = true;
  
  setTimeout(() => document.getElementById('brandHeader').classList.add('visible'), 200);
  
  setTimeout(() => { showMessage('message1'); state.currentMoment = 1; }, TIMING.moment1Start);
  setTimeout(() => { showMessage('message2'); state.currentMoment = 2; }, TIMING.moment2Start);
  setTimeout(() => { showMessage('message3'); state.currentMoment = 3; }, TIMING.moment3Start);
  setTimeout(() => { showMessage('message4'); state.currentMoment = 4; }, TIMING.moment4Start);
  setTimeout(() => { showMessage('message5'); state.currentMoment = 5; }, TIMING.moment5Start);
  setTimeout(() => { showCTA(); }, TIMING.ctaStart);
}

function skipToCTA() {
  document.querySelectorAll('.message').forEach(msg => msg.classList.remove('visible'));
  showCTA();
  state.currentMoment = 6;
}

// ========================================
// TRANSICIÓN A ESCENA 2
// ========================================
function transitionToNextScene() {
  const overlay = document.getElementById('transitionOverlay');
  const message = document.getElementById('transitionMessage');
  
  overlay.classList.add('active');
  setTimeout(() => message.classList.add('visible'), 500);
  
  setTimeout(() => {
    console.log('Navegando a Escena 2: El Espejo');
    // window.location.href = 'escena-02-espejo.html';
  }, 2500);
}

// ========================================
// AUDIO
// ========================================
function toggleAudio() {
  const audio = document.getElementById('ambientAudio');
  const button = document.getElementById('audioButton');
  
  if (state.audioEnabled) {
    audio.pause();
    state.audioEnabled = false;
    button.textContent = '🔊 Activar experiencia sonora';
  } else {
    audio.play().catch(() => console.log('Audio no disponible (placeholder)'));
    state.audioEnabled = true;
    button.textContent = ' Silenciar';
  }
}

// ========================================
// EVENT LISTENERS
// ========================================
document.getElementById('ctaButton').addEventListener('click', transitionToNextScene);
document.getElementById('skipButton').addEventListener('click', skipToCTA);
document.getElementById('audioButton').addEventListener('click', toggleAudio);
window.addEventListener('resize', resizeCanvas);

// ========================================
// INICIALIZACIÓN
// ========================================
window.addEventListener('DOMContentLoaded', () => {
  initCanvas();
  animateCanvas();
  startSequence();
});
</script>
